<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card .valor {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .card.entrada .valor {
            color: #10b981;
        }

        .card.saida .valor {
            color: #ef4444;
        }

        .card.saldo .valor {
            color: #667eea;
        }

        .secao {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .secao h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status.pendente {
            background: #fef3c7;
            color: #d97706;
        }

        .status.pago {
            background: #d1fae5;
            color: #059669;
        }

        .tipo.entrada {
            color: #10b981;
            font-weight: 600;
        }

        .tipo.saida {
            color: #ef4444;
            font-weight: 600;
        }

        .carregando {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Dashboard Financeiro</h1>
            <p>Módulo Financeiro do ERP</p>
        </header>

        <div class="cards">
            <div class="card entrada">
                <h3>Total de Entradas</h3>
                <div class="valor" id="total-entradas">R$ 0,00</div>
            </div>
            <div class="card saida">
                <h3>Total de Saídas</h3>
                <div class="valor" id="total-saidas">R$ 0,00</div>
            </div>
            <div class="card saldo">
                <h3>Saldo Consolidado</h3>
                <div class="valor" id="saldo">R$ 0,00</div>
            </div>
        </div>

        <div class="secao">
            <h2>📋 Todas as Transações</h2>
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Tipo</th>
                        <th>Vencimento</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabela-transacoes">
                    <tr>
                        <td colspan="5" class="carregando">Carregando dados...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });
        }

        async function carregarDados() {
            try {
                const [fluxoRes, transacoesRes] = await Promise.all([
                    fetch('/financeiro/fluxo-caixa'),
                    fetch('/financeiro/contas-pagar').then(r => r.json()).then(pagar => 
                        fetch('/financeiro/contas-receber').then(r => r.json()).then(receber => [...pagar, ...receber])
                    )
                ]);

                const fluxo = await fluxoRes.json();
                const transacoes = transacoesRes;

                document.getElementById('total-entradas').textContent = formatarMoeda(fluxo.total_entradas);
                document.getElementById('total-saidas').textContent = formatarMoeda(fluxo.total_saidas);
                document.getElementById('saldo').textContent = formatarMoeda(fluxo.saldo);

                const tbody = document.getElementById('tabela-transacoes');
                tbody.innerHTML = '';

                transacoes.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${t.descricao}</td>
                        <td>${formatarMoeda(t.valor)}</td>
                        <td class="tipo ${t.tipo}">${t.tipo === 'entrada' ? '📥 Entrada' : '📤 Saída'}</td>
                        <td>${new Date(t.data_vencimento).toLocaleDateString('pt-BR')}</td>
                        <td><span class="status ${t.status}">${t.status === 'pago' ? '✅ Pago' : '⏳ Pendente'}</span></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (erro) {
                console.error('Erro ao carregar dados:', erro);
                document.getElementById('tabela-transacoes').innerHTML = 
                    '<tr><td colspan="5" class="carregando">Erro ao carregar os dados</td></tr>';
            }
        }

        carregarDados();
    </script>
</body>
</html>
